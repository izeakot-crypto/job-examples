              - img "Антиплагиат онлайн Advego" [ref=e113]
              - heading "Возможности проверки на антиплагиат" [level=2] [ref=e114]
              - list [ref=e115]:
                - listitem [ref=e116]: Проверка на плагиат больших текстов — до 95 000 символов за раз.
                - listitem [ref=e117]: Встроенная защита от сервисов "обхода антиплагиата".
                - listitem [ref=e118]: Поддержка исключения сайтов и интернет-страниц.
                - listitem [ref=e119]: Выявление скрытого плагиата и рерайтинга.
                - listitem [ref=e120]: Автоматическое распознавание 7 языков.
                - listitem [ref=e121]: Полноценная работа по API.
              - heading "Как проверить уникальность текста" [level=3] [ref=e122]
              - paragraph [ref=e123]: Скопируйте статью в поле "Текст" и нажмите кнопку "Проверить". Через несколько минут вы получите подробный отчет о найденных источниках совпадений в интернете и процент уникальности текста.
              - paragraph [ref=e124]: Для удобства поиска рекомендуем указывать уникальное название для проверки. Если название не указано, то оно сгенерируется автоматически.
              - paragraph [ref=e125]: Если необходимо исключить сайт, его раздел или конкретную страницу, укажите их адреса в поле "Исключить домен или URL" перед запуском проверки.
              - heading "Поддержка языков" [level=3] [ref=e126]
              - paragraph [ref=e127]: "Для поиска плагиата по умолчанию используется русский язык, также поддерживаются: английский, китайский, немецкий, французский, испанский и украинский языки."
              - paragraph [ref=e128]: Если язык по умолчанию не менялся, но большая часть текста содержит некириллические символы, система автоматически переключится на ближайший похожий язык.
              - heading "Как поделиться результатом проверки" [level=3] [ref=e129]
              - paragraph [ref=e130]: По умолчанию проверяемый текст и отчет по нему доступны только авторизованному пользователю, который создал проверку. Это позволяет сохранить уникальность текста.
              - paragraph [ref=e131]: Чтобы открыть публичный доступ к тексту и проверке, нажмите кнопку "Открыть доступ" — теперь по сгенерированной уникальной ссылке смогут перейти все желающие и просмотреть подробный отчет проверки на антиплагиат.
              - paragraph [ref=e132]: Внимание! Если к отчету открыт публичный доступ, все, у кого есть ссылка, смогут скопировать текст. Рекомендуем делиться ссылкой только с доверенными лицами и на короткий срок, после чего закрывать доступ — для этого нажмите кнопку "Закрыть доступ".
              - img "Проверка текста на антиплагиат онлайн" [ref=e133]
              - heading "В чем разница между Адвего Плагиатусом и онлайн-проверкой Адвего на антиплагиат" [level=3] [ref=e134]
              - paragraph [ref=e135]: Адвего Плагиатус — это программа для установки на компьютер, а проверка Адвего на антиплагиат работает онлайн на сайте advego.com и не требует установки программ. Оба сервиса разработаны компаний Адвего и используют одинаковые алгоритмы.
              - paragraph [ref=e136]: Поддержка Адвего Плагиатуса прекращена с 2023 года, поэтому рекомендуем использовать онлайн-проверку уникальности, которая работает полностью автоматически и при любой скорости интернета.
              - heading "Какие статьи можно проверить на плагиат" [level=3] [ref=e137]
              - list [ref=e138]:
                - listitem [ref=e139]: Тексты для сайтов — информационные, рекламные, новости, SEO-тексты и др.
                - listitem [ref=e140]: Рефераты, дипломы, курсовые и научные работы.
                - listitem [ref=e141]: Тексты печатных произведений для поиска сайтов-плагиатчиков.
              - paragraph [ref=e142]: Для поиска источников используются общедоступные результаты поисковых систем Яндекс, Google, Rambler, Bing, Yahoo, Qip, Nigma, что обеспечивает быстрое нахождение украденных текстов сразу после их индексации.
              - heading "Как повысить уникальность текста" [level=3] [ref=e143]
              - list [ref=e144]:
                - listitem [ref=e145]:
                  - text: Проверьте качество текста
                  - link "Адвего Лингвистом" [ref=e146] [cursor=pointer]:
                    - /url: /v2/lingvo/
                  - text: ", избавьтесь от мусорных и водных фраз."
                - listitem [ref=e147]: Используйте несколько источников информации для наполнения текста.
                - listitem [ref=e148]: Проконсультируйтесь с экспертами из целевой отрасли, изучите справочники и профильные форумы.
                - listitem [ref=e149]: Конкретизируйте ответы на вопросы, которым посвящена статья, избегайте общих описаний и фраз.
