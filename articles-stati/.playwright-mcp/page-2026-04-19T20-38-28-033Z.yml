          - generic [ref=e100]:
            - img "Seo анализ текста онлайн" [ref=e101]
            - heading "Зачем нужен SEO анализ текста" [level=2] [ref=e102]
            - paragraph [ref=e103]: Поисковые системы оценивают качество и релевантность статьи по содержащимся в ней словам и словосочетаниям (коллокациям). Чем больше в тексте тематичных ключевых фраз, тем больше шансов, что он получит высокую оценку.
            - paragraph [ref=e104]: Соответственно, если в тексте будет мало ключевых слов, но много «воды» — стоп-слов, вставных слов, шаблонных фраз, качество статьи будет низким.
            - paragraph [ref=e105]: Но и слишком большое количество ключевиков — тоже плохо, такой документ получит отметку «переспам» и вряд ли будет показан в поисковой выдаче.
            - paragraph [ref=e106]: Оценить эти показатели поможет сервис семантического анализа, который покажет процент ключевых слов и количество стоп-слов в тексте.
            - heading "SEO анализ текста Адвего определяет:" [level=3] [ref=e107]
            - list [ref=e108]:
              - listitem [ref=e109]: плотность ключевых слов, процент ключевых фраз;
              - listitem [ref=e110]: частотность слов;
              - listitem [ref=e111]: количество стоп-слов;
              - listitem [ref=e112]: "объем текста: количество символов с пробелами и без пробелов;"
              - listitem [ref=e113]: "количество слов: уникальных, значимых, всего;"
              - listitem [ref=e114]: водность, процент воды;
              - listitem [ref=e115]: тошноту текста, классическую и академическую;
              - listitem [ref=e116]: количество грамматических ошибок.
            - paragraph [ref=e117]:
              - text: Наш онлайн сервис показывает
              - strong [ref=e118]: семантическое ядро
              - text: текста страницы — все значимые и ключевые слова, что позволит оценить, по каким запросам она будет показываться выше после того, как проведет поиск ключевых слов в тексте.
            - paragraph [ref=e119]: Также семантический анализ показывает все стоп-слова и грамматические ошибки.
            - paragraph [ref=e120]:
              - emphasis [ref=e121]: Пример отчета проверки семантического SEO анализа текста онлайн
            - img "Семантический SEO анализ текста онлайн" [ref=e122]
            - heading "Как рассчитывается тошнота текста" [level=3] [ref=e123]
            - paragraph [ref=e124]: Классическая тошнота определяется по самому частотному слову — как квадратный корень из количества его вхождений. Например, слово «текст» встречается на этой странице 16 раз, классическая тошнота будет равна 4.
            - paragraph [ref=e125]:
              - emphasis [ref=e126]: Важно! Максимально допустимое значение классической тошноты зависит от объема текста — для 20 000 знаков тошнота, равная 5, будет нормальной, а для 1000 знаков — слишком высокой.
            - paragraph [ref=e127]: Академическая тошнота определяется как отношение самых частотных и значимых слов по специальной формуле. Нормальное значение — в пределах 5-15%.
            - paragraph [ref=e128]:
              - text: По тошноте текста можно судить о натуральности текста и его SEO-оптимизации под поисковые запросы. Высокий
              - strong [ref=e129]: показатель тошноты
              - text: онлайн для поисковиков является плохим знаком.
            - heading "Как рассчитывается водность текста" [level=3] [ref=e130]
            - paragraph [ref=e131]: Процент воды в Адвего определяется как отношение незначимых слов к общему количеству слов. То есть чем больше в статье значимых слов, тем меньше в итоге «воды».
            - paragraph [ref=e132]: Конечно, невозможно написать сео текст совсем без воды, нормальный показатель — 55%-75%.
            - paragraph [ref=e133]: "Чтобы уменьшить процент водности, необходимо почистить текст от широко распространенных фраз и терминов, вставных слов: «в современном мире», «так сказать», «всем известно» и т. п. Также повышает качество текста употребление специализированных терминов и профессиональной лексики."
