networks:
  py-services-net:
    driver: bridge

services:
  # === NGINX GATEWAY (SSL termination + routing) ===
  # /api/* → prod, /test/* → test
  gateway:
    image: nginx:alpine
    container_name: py-services-gateway
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/ssl/oki-toki.net:/etc/ssl/oki-toki.net:ro
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - py-services-net
    depends_on:
      - prod
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # === PROD (main branch) ===
  prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: py-services-prod
    restart: always
    env_file: .env
    environment:
      - CONTAINER_ROLE=prod
    volumes:
      - /var/log/py-services/prod:/var/log/py-services
      - /var/data/py-services/prod/audit:/app/audit
      - /etc/hostname:/etc/host_hostname:ro
      - /opt/py-services/credentials:/app/credentials:ro
    networks:
      - py-services-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # === TEST (staging branch) ===
  test:
    build:
      context: /opt/py-services-test/
      dockerfile: Dockerfile
    container_name: py-services-test
    restart: always
    env_file: .env
    environment:
      - CONTAINER_ROLE=test
    volumes:
      - /var/log/py-services/test:/var/log/py-services
      - /var/data/py-services/test/audit:/app/audit
      - /etc/hostname:/etc/host_hostname:ro
      - /opt/py-services/credentials:/app/credentials:ro
    networks:
      - py-services-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
