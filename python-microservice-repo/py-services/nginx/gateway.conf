# ============================================
# Nginx Gateway — SSL termination + routing
# Роутит /api/* → prod, /test/* → test
# ============================================

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name py-services.oki-toki.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name py-services.oki-toki.net;

    ssl_certificate     /etc/ssl/oki-toki.net/fullchain.pem;
    ssl_certificate_key /etc/ssl/oki-toki.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ============================================
    # PROD — /api/* → py-services-prod:80
    # ============================================
    location /api/ {
        proxy_pass http://py-services-prod:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Prod docs hub
    location = /docs {
        proxy_pass http://py-services-prod:80/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================
    # TEST — /test/* → py-services-test:80
    # Rewrite: /test/xxx → /api/xxx
    # ============================================
    location /test/ {
        rewrite ^/test/(.*)$ /api/$1 break;
        proxy_pass http://py-services-test:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Test docs hub
    location = /test-docs {
        proxy_pass http://py-services-test:80/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Root — 404
    location / {
        return 404 '{"error": "Not found. Use /api/ for prod or /test/ for staging."}';
        add_header Content-Type application/json;
    }
}
