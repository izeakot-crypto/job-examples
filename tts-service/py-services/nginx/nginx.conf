# Внутренний Nginx (внутри контейнера prod/test)
# SSL теперь в gateway-контейнере, здесь только HTTP
server {
    listen 80;
    server_name _;

    # py-services-translation-checker
    location /api/translation-checker/ {
        proxy_pass http://127.0.0.1:8585;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Каталог API документации
    location = /docs {
        alias /usr/share/nginx/html/docs.html;
        default_type text/html;
    }

    # py-services-tts-google-chirp3
    location /api/tts-google-chirp3/ {
        proxy_pass http://127.0.0.1:8589;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # py-services-lira-assistants-api
    location /api/lira-assistants-api/ {
        proxy_pass http://127.0.0.1:8590;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # py-services-quality-check
    location /api/quality-check/ {
        proxy_pass http://127.0.0.1:8591;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # py-services-competitor-monitor
    location /api/competitor-monitor/ {
        proxy_pass http://127.0.0.1:8592;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Будущие сервисы:
    # location /api/original-checker/ {
    #     proxy_pass http://127.0.0.1:8586;
    # }

    location / {
        return 404 '{"error": "Not found"}';
        add_header Content-Type application/json;
    }
}
