;; ============================================================
;; TTS WebSocket Client для LIRA — Chirp3-HD
;; ============================================================
;; Підключається до Python TTS WebSocket сервера,
;; надсилає текст, отримує WAV чанки, зберігає та грає.
;;
;; Використання у сценарії дзвінка:
;;   operation function TTS_Say "Дякуємо за дзвінок до компанії Окі-Токі." "Leda" "happy"
;;
;; Сервер: ws://TTS_SERVER_IP:8765
;; ============================================================

[global]
;; IP та порт Python TTS WebSocket сервера
;; ЗМІНИТИ на реальний IP сервера:
operation const &TTS_WS_HOST "127.0.0.1"
operation const $TTS_WS_PORT 8765
;; Папка для тимчасових WAV файлів
operation const &TTS_WAV_DIR "/tmp/tts_cache/"

;; ============================================================
;; Головна функція: TTS_Say
;; Параметри: &text, &voice (Leda/Puck/Kore), &emotion (опціонально)
;; ============================================================
[function]
system

+TTS_Say
operation parameters &text &voice &emotion
operation get &tts_reqid timestamp_ms

;; 1. TCP підключення до TTS сервера
operation function tcp_connect $tts_fd &TTS_WS_HOST $TTS_WS_PORT
operation if eq result 0
    operation echo "[TTS] ERROR: Cannot connect to TTS server"
    operation return
operation endif

;; 2. WebSocket Handshake (HTTP Upgrade)
;; Генеруємо випадковий ключ для Sec-WebSocket-Key
operation rand_string &ws_raw_key 16
operation base64encode &ws_raw_key &ws_key_b64

;; Формуємо HTTP GET запит з Upgrade заголовками
operation buffer_create_content_get% 0 "/tts" "LIRA-TTS/1.0"
operation buffer_field_add 0 "Host" &TTS_WS_HOST
operation buffer_field_add 0 "Upgrade" "websocket"
operation buffer_field_add 0 "Connection" "Upgrade"
operation buffer_field_add 0 "Sec-WebSocket-Key" &ws_key_b64
operation buffer_field_add 0 "Sec-WebSocket-Version" "13"

;; Відправляємо handshake
operation resend_bin 0

;; Чекаємо відповідь 101 Switching Protocols
operation wait 0 3000
;; Перевіряємо що сервер прийняв WebSocket
operation if eq result 0
    operation echo "[TTS] ERROR: WebSocket handshake timeout"
    operation function close $tts_fd
    operation return
operation endif

;; 3. Формуємо JSON запит
;; Формат: {"text":"...", "voice":"Leda", "request_id":"..."}
operation json_create &tts_json
operation json_add &tts_json "text" &text
operation json_add &tts_json "voice" &voice
operation json_add &tts_json "request_id" &tts_reqid
operation json_complete &tts_json

;; 4. Кодуємо у WebSocket фрейм (text, opcode=1, fin=1, mask=1)
;; websocket_encode_var &data $side $fin $opcode $mask
operation websocket_encode_var &tts_json 0 1 1 0 1
operation resend_bin 0

operation echo "[TTS] Sent request, waiting for audio chunks..."
operation get &tts_start datems
operation const $tts_chunk_num 0
operation const $tts_done 0

;; 5. Цикл отримання чанків
operation do
    ;; Чекаємо дані від сервера (таймаут 10 секунд)
    operation wait 0 10000

    ;; Декодуємо WebSocket фрейм
    ;; websocket_decode $side @$fin @$opcode @$rsv @$mask
    operation webSocket_decode 0 @$ws_fin @$ws_opcode @$ws_rsv @$ws_mask

    operation if gt result 0
        ;; opcode=1: текстове повідомлення (JSON метадані або done)
        operation if eq $ws_opcode 1
            operation get &ws_text ws_decoded

            ;; Перевіряємо чи це "done" повідомлення
            operation find $pos &ws_text "done"
            operation if gt $pos 0
                operation const $tts_done 1
                operation json_locate &ws_text "total_ms" &tts_total_ms
                operation echo "[TTS] Done! Total time: &tts_total_ms ms"
            operation else
                ;; Це метадані чанку — зберігаємо номер частини
                operation json_locate &ws_text "part" $tts_current_part
                operation json_locate &ws_text "gen_time_ms" $tts_gen_ms
                operation echo "[TTS] Chunk $tts_current_part metadata received, gen=$tts_gen_ms ms"
            operation endif
        operation endif

        ;; opcode=2: бінарне повідомлення (WAV аудіо)
        operation if eq $ws_opcode 2
            operation incr $tts_chunk_num

            ;; Зберігаємо WAV чанк у файл
            operation add &tts_wav_path &TTS_WAV_DIR "tts_" &tts_reqid "_" $tts_chunk_num ".wav"
            operation function write_file &tts_wav_path ws_decoded

            operation echo "[TTS] Chunk $tts_chunk_num saved: &tts_wav_path"

            ;; Граємо чанк зразу (поки наступний завантажується)
            operation play_file &tts_wav_path 0
        operation endif
    operation else
        ;; Таймаут або помилка
        operation const $tts_done 1
        operation echo "[TTS] Timeout waiting for chunks"
    operation endif

operation while eq $tts_done 0

;; 6. Закриваємо з'єднання
operation function close $tts_fd

operation diffms $tts_elapsed datems &tts_start
operation echo "[TTS] Finished: $tts_chunk_num chunks in $tts_elapsed ms"
operation return


;; ============================================================
;; Приклад використання в сценарії дзвінка
;; ============================================================
;;
;; [dialer_new]   або   [acd_in]
;; system
;;
;; +
;; ;; ... ініціалізація дзвінка ...
;;
;; ;; Привітання через TTS
;; operation function TTS_Say "Дякуємо за дзвінок до компанії Окі-Токі. Зачекайте, будь ласка." "Leda" ""
;;
;; ;; Динамічне повідомлення (наприклад, з бази)
;; operation add &greeting "Вітаємо, " &contact_name ". Ваш номер замовлення " $order_id "."
;; operation function TTS_Say &greeting "Puck" ""
;;
;; ;; Далі підключення до оператора
;; operation a_o acd_in
;; ============================================================


;; ============================================================
;; Альтернатива: TTS_Say_Simple — отримує одразу весь WAV
;; (без розбивки на чанки, простіший варіант)
;; ============================================================

+TTS_Say_Simple
operation parameters &text &voice

;; TCP підключення
operation function tcp_connect $tts_fd &TTS_WS_HOST $TTS_WS_PORT
operation if eq result 0
    operation echo "[TTS] ERROR: Cannot connect"
    operation return
operation endif

;; WebSocket handshake
operation rand_string &ws_raw_key 16
operation base64encode &ws_raw_key &ws_key_b64
operation buffer_create_content_get% 0 "/tts" "LIRA-TTS/1.0"
operation buffer_field_add 0 "Host" &TTS_WS_HOST
operation buffer_field_add 0 "Upgrade" "websocket"
operation buffer_field_add 0 "Connection" "Upgrade"
operation buffer_field_add 0 "Sec-WebSocket-Key" &ws_key_b64
operation buffer_field_add 0 "Sec-WebSocket-Version" "13"
operation resend_bin 0
operation wait 0 3000

;; Надсилаємо текст
operation json_create &req
operation json_add &req "text" &text
operation json_add &req "voice" &voice
operation json_add &req "mode" "single"
operation json_complete &req
operation websocket_encode_var &req 0 1 1 0 1
operation resend_bin 0

;; Збираємо всі чанки PCM в один файл
operation get &tts_reqid timestamp_ms
operation add &tts_full_path &TTS_WAV_DIR "tts_full_" &tts_reqid ".wav"
operation const $tts_done 0

operation do
    operation wait 0 10000
    operation webSocket_decode 0 @$ws_fin @$ws_opcode @$ws_rsv @$ws_mask
    operation if gt result 0
        operation if eq $ws_opcode 2
            ;; Дописуємо бінарні дані
            operation function write_to_file &tts_full_path ws_decoded
        operation endif
        operation if eq $ws_opcode 1
            operation get &ws_msg ws_decoded
            operation find $pos &ws_msg "done"
            operation if gt $pos 0
                operation const $tts_done 1
            operation endif
        operation endif
    operation else
        operation const $tts_done 1
    operation endif
operation while eq $tts_done 0

;; Граємо повний файл
operation play_file &tts_full_path 0
operation function close $tts_fd
operation return
