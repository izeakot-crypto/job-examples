; ============================================================
; TTS HTTP Client для LIRA — Chirp3-HD
; ============================================================
; Сервер: http://<SERVER_IP>:8765
; Протокол: HTTP POST з JSON body
; Відповідь /tts: binary WAV (8kHz 16bit mono)
;
; Потік:
;   1. POST /start  → отримати session_id
;   2. POST /tts    → отримати WAV → play_file
;   3. POST /stop   → закрити сесію (або таймаут 5 хв)
; ============================================================

; ---------- Конфігурація ----------
operation const &TTS_SERVER "http://<SERVER_IP>:8765"
operation const &TTS_VOICE "Leda"
operation const &TTS_WAV_DIR "/tmp/tts"

; ============================================================
; Функція: TTS_Start — почати TTS сесію
; ============================================================
; Виклик:  operation function& TTS_Start &call_id
; Результат: &tts_session_id, $tts_ready (1=ok, 0=error)
; ============================================================
:TTS_Start
    operation const $tts_ready 0

    ; Формуємо JSON: {"call_id": "<call_id>"}
    operation add @&fURL "====&TTS_SERVER/start===="
    operation add @&ArgData "===={\"call_id\":\"&call_id\"}===="

    operation function& CallURLJson @&fURL @&ArgData

    operation ? $HttpStatus ne 200 then return

    ; Витягуємо session_id з відповіді
    operation json_locate &tts_session_id &HttpContent "session_id"
    operation const $tts_ready 1
operation return

; ============================================================
; Функція: TTS_Say — згенерувати та програти TTS
; ============================================================
; Виклик:  operation function& TTS_Say &text &voice
; Потрібно: &tts_session_id (від TTS_Start)
; Результат: програє WAV через play_file
; ============================================================
:TTS_Say
    ; Формуємо унікальне ім'я файлу
    operation diffms $tts_ms datems &tempms
    operation add &tts_wav_file "====&TTS_WAV_DIR/tts_$tts_ms.wav===="

    ; curl для отримання binary WAV
    operation add &tts_curl "====curl -s -X POST &TTS_SERVER/tts -H \"Content-Type: application/json\" -d \"{\\\"session_id\\\":\\\"&tts_session_id\\\",\\\"text\\\":\\\"&text\\\",\\\"voice\\\":\\\"&voice\\\"}\" -o &tts_wav_file===="

    operation run_program &tts_curl

    ; Програємо WAV
    operation play_file &tts_wav_file
operation return

; ============================================================
; Функція: TTS_Say_Simple — TTS з голосом за замовчуванням
; ============================================================
; Виклик:  operation function& TTS_Say_Simple &text
; ============================================================
:TTS_Say_Simple
    operation function& TTS_Say &text &TTS_VOICE
operation return

; ============================================================
; Функція: TTS_Stop — закрити TTS сесію
; ============================================================
:TTS_Stop
    operation add @&fURL "====&TTS_SERVER/stop===="
    operation add @&ArgData "===={\"session_id\":\"&tts_session_id\"}===="
    operation function& CallURLJson @&fURL @&ArgData
operation return


